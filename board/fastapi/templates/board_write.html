{% extends "base.html" %}
{% block title %}글쓰기{% endblock %}
{% block style %}
<style>
  .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  h2 { color: #2d3748; margin-bottom: 8px; }
  .author-info { color: #718096; font-size: 0.9rem; margin-bottom: 24px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; color: #4a5568; font-size: 0.9rem; margin-bottom: 6px; font-weight: bold; }
  input, textarea { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
  textarea { height: 200px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #4299e1; }
  .form-footer { display: flex; gap: 10px; justify-content: flex-end; }
</style>
{% endblock %}
{% block content %}
  <div class="card">
    <h2>✏️ 글쓰기</h2>
    <p class="author-info">작성자: <strong>{{ user.username }}</strong></p>
    <form method="post" action="/board/write">
      <div class="form-group">
        <label>제목</label>
        <input type="text" name="title" placeholder="제목을 입력하세요" required autofocus>
      </div>
      <div class="form-group">
        <label>내용</label>
        <textarea name="content" placeholder="내용을 입력하세요" required></textarea>
      </div>
      <div class="form-footer">
        <a href="/board/" class="btn btn-red">취소</a>
        <button type="submit" class="btn btn-blue">등록</button>
      </div>
    </form>
  </div>
{% endblock %}
