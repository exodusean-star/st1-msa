apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-nginx-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-nginx
  template:
    metadata:
      labels:
        app: auth-nginx
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: auth-nginx
              topologyKey: kubernetes.io/hostname
      containers:
      - name: auth-nginx
        image: 476293896981.dkr.ecr.ap-south-1.amazonaws.com/st1-auth-nginx:v2
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /auth/
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /auth/
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-fastapi-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-fastapi
  template:
    metadata:
      labels:
        app: auth-fastapi
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: auth-fastapi
              topologyKey: kubernetes.io/hostname
      containers:
      - name: auth-fastapi
        image: 476293896981.dkr.ecr.ap-south-1.amazonaws.com/st1-auth-fastapi:v9
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: st1-auth-secret
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-fastapi-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: auth-fastapi
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: auth-nginx-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: auth-nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: st1-auth-ingress
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/load-balancer-attributes: access_logs.s3.enabled=true,access_logs.s3.bucket=web.sory.cloud,access_logs.s3.prefix=alb-logs/auth
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /auth/
            pathType: Prefix
            backend:
              service:
                name: auth-nginx-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-nginx-service
                port:
                  number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-fastapi-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-fastapi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-nginx-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-nginx
