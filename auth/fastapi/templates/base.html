<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{% block title %}ST1 Auth{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }
    nav { background: #2d3748; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.95rem; }
    nav a:hover { color: #90cdf4; }
    .logo { color: white; font-size: 1.2rem; font-weight: bold; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-user { color: #90cdf4; font-size: 0.9rem; }
    .container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
    .container-sm { max-width: 480px; margin: 60px auto; padding: 0 20px; }
    .btn { display: inline-block; padding: 8px 20px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: bold; cursor: pointer; border: none; }
    .btn-blue  { background: #4299e1; color: white; }
    .btn-green { background: #48bb78; color: white; }
    .btn-red   { background: #fc8181; color: white; }
    .btn-gray  { background: #718096; color: white; }
    .btn-full  { width: 100%; text-align: center; padding: 10px; }
    .btn:hover { opacity: 0.85; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .card h2 { color: #2d3748; margin-bottom: 28px; text-align: center; }
    .form-group { margin-bottom: 18px; }
    label { display: block; color: #4a5568; font-size: 0.9rem; margin-bottom: 6px; font-weight: bold; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #4299e1; }
    .error { background: #fff5f5; color: #c53030; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 16px; border: 1px solid #feb2b2; }
    .link-row { text-align: center; margin-top: 16px; font-size: 0.9rem; color: #718096; }
    .link-row a { color: #4299e1; text-decoration: none; }
    .link-row a:hover { text-decoration: underline; }
  </style>
  {% block style %}{% endblock %}
</head>
<body>
  <nav>
    <span class="logo">🔐 ST1 Auth</span>
    <div class="nav-right">
      {% if user %}
        {% if board_url %}
          <a href="{{ board_url }}/board/">게시판</a>
          <a href="{{ board_url }}/guestbook/">방명록</a>
        {% endif %}
        <span class="nav-user">👤 {{ user.username }}</span>
        {% if user.username == "admin" %}
          <a href="/auth/admin">관리자</a>
        {% endif %}
        <a href="/auth/logout" class="btn btn-gray" style="padding:4px 12px;font-size:0.8rem;">로그아웃</a>
      {% else %}
        <a href="/auth/login">로그인</a>
        <a href="/auth/register">회원가입</a>
      {% endif %}
    </div>
  </nav>
  <div class="{% block container_class %}container-sm{% endblock %}">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
