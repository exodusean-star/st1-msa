name: Deploy Auth Service

on:
  push:
    branches: [main]
    paths:
      - 'auth/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      fastapi: ${{ steps.filter.outputs.fastapi }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            fastapi:
              - 'auth/fastapi/**'
            nginx:
              - 'auth/nginx/**'

  deploy-fastapi:
    needs: detect-changes
    if: needs.detect-changes.outputs.fastapi == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push auth-fastapi
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/st1-msa-auth-fastapi:${{ github.sha }}
          docker build -t $IMAGE ./auth/fastapi
          docker push $IMAGE

      - name: Update image tag in deploy.yaml
        run: |
          sed -i "s|image: .*auth-fastapi:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/st1-msa-auth-fastapi:${{ github.sha }}|" k8s/auth/deploy.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/auth/deploy.yaml
          git diff --cached --quiet || (git commit -m "ci: update auth-fastapi image to ${{ github.sha }}" && git pull --rebase && git push)

  deploy-nginx:
    needs: detect-changes
    if: needs.detect-changes.outputs.nginx == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push auth-nginx
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/st1-msa-auth-nginx:${{ github.sha }}
          docker build -t $IMAGE ./auth/nginx
          docker push $IMAGE

      - name: Update image tag in deploy.yaml
        run: |
          sed -i "s|image: .*auth-nginx:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/st1-msa-auth-nginx:${{ github.sha }}|" k8s/auth/deploy.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/auth/deploy.yaml
          git diff --cached --quiet || (git commit -m "ci: update auth-nginx image to ${{ github.sha }}" && git pull --rebase && git push)
